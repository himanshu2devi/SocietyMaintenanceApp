# SocietyWale backends on one AWS EC2 (always-on, no Render cold starts)
# Usage on the server (from repo root):
#   cd deploy/aws
#   cp .env.example .env   # fill secrets
#   docker compose up -d --build

services:
  identity:
    build:
      context: ../../backend/identity-service
      dockerfile: Dockerfile
    container_name: societywale-identity
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      PORT: "8081"
      DB_URL: ${DB_URL}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS}
      JAVA_OPTS: ${JAVA_OPTS:--XX:+UseContainerSupport -XX:MaxRAMPercentage=55.0}
    expose:
      - "8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8081/actuator/health | grep -q UP"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s
    mem_limit: 768m

  core:
    build:
      context: ../../backend/core-service
      dockerfile: Dockerfile
    container_name: societywale-core
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      PORT: "8082"
      DB_URL: ${DB_URL}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS}
      JAVA_OPTS: ${JAVA_OPTS:--XX:+UseContainerSupport -XX:MaxRAMPercentage=55.0}
    expose:
      - "8082"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8082/actuator/health | grep -q UP"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s
    mem_limit: 768m
  caddy:
    image: caddy:2.8-alpine
    container_name: societywale-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - identity
      - core

volumes:
  caddy_data:
  caddy_config:

# Neon PostgreSQL (same single free-tier DB as identity-service) + Railway
# Local: SPRING_PROFILES_ACTIVE=prod and set DB_PASSWORD / JWT_SECRET
# Railway sets PORT; local default stays 8082 for the frontend Axios URL
server.port=${PORT:8082}

spring.datasource.url=${DB_URL:jdbc:postgresql://ep-shy-paper-aohwh4tb-pooler.c-2.ap-southeast-1.aws.neon.tech/Societywale?sslmode=require}
spring.datasource.username=${DB_USER:neondb_owner}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoints.web.base-path=/actuator

app.cors.allowed-origins=${APP_CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

app.groq.api-key=${GROQ_API_KEY:}
app.groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}

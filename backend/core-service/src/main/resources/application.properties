spring.application.name=core-service
server.port=${PORT:8082}

# Default "h2" = empty in-memory DB. For Neon data locally use:
#   .\scripts\start-backend-neon.ps1 -Service core
spring.profiles.active=h2

# ---- Shared JWT config (MUST match identity-service) ----
security.jwt.secret=${JWT_SECRET:ChangeMeToA256BitBase64SecretForSocietyAppProductionUseEnvVar!!}

# ---- CORS (React dev server) ----
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ---- Groq AI assistant (set GROQ_API_KEY in backend/neon.local.env) ----
app.groq.api-key=${GROQ_API_KEY:}
app.groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

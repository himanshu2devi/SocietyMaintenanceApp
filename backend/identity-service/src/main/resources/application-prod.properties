# Neon PostgreSQL (single free-tier DB) + Railway
# Local: SPRING_PROFILES_ACTIVE=prod and set DB_PASSWORD / JWT_SECRET
# Railway sets PORT; local default stays 8081 for the frontend Axios URL
server.port=${PORT:8081}

spring.datasource.url=${DB_URL:jdbc:postgresql://ep-shy-paper-aohwh4tb-pooler.c-2.ap-southeast-1.aws.neon.tech/Societywale?sslmode=require}
spring.datasource.username=${DB_USER:neondb_owner}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoints.web.base-path=/actuator
# MailSMTP health is optional — don't mark the whole service DOWN if Gmail is briefly unreachable
management.health.mail.enabled=false

app.cors.allowed-origins=${APP_CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:societywale.in@gmail.com}
app.mail.owner-inbox=${MAIL_OWNER_INBOX:societywale.in@gmail.com}
app.mail.app-url=${MAIL_APP_URL:https://societywale.in}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

app.razorpay.key-id=${RAZORPAY_KEY_ID:}
app.razorpay.key-secret=${RAZORPAY_KEY_SECRET:}
app.razorpay.webhook-secret=${RAZORPAY_WEBHOOK_SECRET:}
app.razorpay.amount-paise=${RAZORPAY_AMOUNT_PAISE:100}
app.razorpay.currency=${RAZORPAY_CURRENCY:INR}
app.razorpay.list-price-rupees=${RAZORPAY_LIST_PRICE:9999}
app.razorpay.offer-price-rupees=${RAZORPAY_OFFER_PRICE:4999}
app.razorpay.early-bird-limit=${RAZORPAY_EARLY_BIRD_LIMIT:10}

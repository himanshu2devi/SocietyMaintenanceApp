spring.application.name=identity-service
server.port=8081

# ---- Active profile: 'h2' for quick local dev, 'postgres' for prod ----
spring.profiles.active=h2

# ---- Shared JWT config (MUST match core-service) ----
# Override in production via environment variable JWT_SECRET
security.jwt.secret=${JWT_SECRET:ChangeMeToA256BitBase64SecretForSocietyAppProductionUseEnvVar!!}
security.jwt.expiration-ms=86400000

# ---- CORS (React dev server) ----
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ---- JPA ----
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

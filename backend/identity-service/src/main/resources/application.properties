spring.application.name=identity-service
server.port=${PORT:8081}

# ---- Active profile ----
# Default "h2" = empty in-memory DB (quick smoke tests only).
# For your real Neon users/data locally, do NOT use plain `mvn spring-boot:run`.
# Use:  .\scripts\start-backend-neon.ps1 -Service identity
#       .\scripts\start-backend-neon.ps1 -Service core
spring.profiles.active=h2

# ---- Shared JWT config (MUST match core-service) ----
# Override in production via environment variable JWT_SECRET
security.jwt.secret=${JWT_SECRET:ChangeMeToA256BitBase64SecretForSocietyAppProductionUseEnvVar!!}
security.jwt.expiration-ms=86400000

# ---- CORS (React dev server) ----
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ---- Gmail SMTP (set MAIL_USERNAME / MAIL_APP_PASSWORD in neon.local.env) ----
app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:societywale.in@gmail.com}
app.mail.owner-inbox=${MAIL_OWNER_INBOX:societywale.in@gmail.com}
app.mail.app-url=${MAIL_APP_URL:https://societywale.in}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ---- JPA ----
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
